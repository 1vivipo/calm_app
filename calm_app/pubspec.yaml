name: calm_app
description: "平静 AI - 你的智能对话助手"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  cupertino_icons: ^1.0.6
  
  # 图片选择
  image_picker: ^1.0.7
  
  # 网络图片缓存
  cached_network_image: ^3.3.1
  
  # 文件保存
  path_provider: ^2.1.2
  
  # 分享
  share_plus: ^7.2.1
  
  # 打开链接
  url_launcher: ^6.2.4
  
  # 权限请求
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
